<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Search</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .vehicle-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .vehicle {
            border: 2px solid transparent;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .vehicle img {
            width: 100px;
            height: 80px;
        }

        .vehicle:hover {
            transform: scale(1.1);
        }

        .selected {
            border: 2px solid green;
            background: #eaffea;
        }
    </style>
</head>

<body>

<h2>Select Your Ride</h2>


    <a href="https://jituloying1.github.io/pathaidebikecustomer/">
      <button>Book a baike </button>
    </a>

 <a href="https://jituloying1.github.io/PATHAIDEVEHICLE/">
      <button>Book a car </button>
    </a>

 <a href="https://jituloying1.github.io/PATHAIDEVEHICLE/">
      <button>Book a e-rikshaw </button>
    </a>

 <a href="https://jituloying1.github.io/PATHAIDEVEHICLE/">
      <button>Book a Driver</button>
    </a>

 <a href="https://jituloying1.github.io/PATHAIDEVEHICLE/">
      <button>Book a Curier </button>
    </a>

 <a href="https://jituloying1.github.io/PATHAIDEVEHICLE/">
      <button>Book a Tractor </button>
    </a>

 <a href="https://jituloying1.github.io/PATHAIDEVEHICLE/">
      <button>xxx</button>
    </a>




<div id="results"></div>

<script>
function selectVehicle(vehicle, element) {

    // highlight selected
    document.querySelectorAll(".vehicle").forEach(v => v.classList.remove("selected"));
    element.classList.add("selected");

    let distance = 5;

    let rates = {
        bike: 10,
        car: 20,
        erickshaw: 15,
        tractor: 25,
        courier: 12,
        driver: 50   // NEW DRIVER RATE (per ride)
    };

    let price = rates[vehicle] * distance;

    // Special message for driver
    let typeText = vehicle === "driver" ? "Driver Booked" : vehicle.toUpperCase() + " Available";

    document.getElementById("results").innerHTML =
        `<p>${typeText}<br>
        Distance: ${distance} km<br>
        Price: ₹${price}</p>`;
}
</script>

</body>
</html>
