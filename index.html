<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Search</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        h2 {
            margin-top: 15px;
            font-size: 28px;
        }

        /* LOGO */
        .logo img {
            width: 220px;
            margin-top: 15px;
            animation: zoomIn 1s ease;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* GRID */
        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        /* BUTTON STYLE */
        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        button:hover {
            background: white;
            color: #1e3c72;
            transform: translateY(-5px) scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        /* CENTER BUTTON */
        .center-btn {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* CALL BUTTON */
        .main-call-btn {
            width: auto;
            padding: 18px 25px;
            background: #ff4b2b;
        }

        .main-call-btn:hover {
            background: white;
            color: #ff4b2b;
        }

        /* SMALL BUTTONS */
        .small-btn {
            width: auto;
            padding: 10px 12px;
            font-size: 12px;
            background: rgba(255,255,255,0.2);
        }

        .small-btn:hover {
            background: white;
            color: #1e3c72;
        }

        /* POPUP */
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .close-btn {
            margin-top: 15px;
            padding: 8px 15px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* PAGE TRANSITION */
        .fade-out {
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }

    </style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
    <img src="file_000000004d2871fa8614eb9e6dbd62f0%20(1)-Photoroom.png">
</div>

<h2> " লোকেল  শক্তি, আধুনিক সেৱা ” </h2>
<h2>Select Your Ride</h2>

<div class="btn-container">

<a href="https://jituloying1.github.io/pathaidebikecustomer/" onclick="goPage(event,this)">
  <button>Book Bike Ride</button>
</a>

<a href="https://jituloying1.github.io/pathaidecar/" onclick="goPage(event,this)">
  <button>Book Car Ride</button>
</a>

<a href="https://jituloying1.github.io/pathaideerikshaw/" onclick="goPage(event,this)">
  <button>Book E-Rickshaw</button>
</a>

<a href="https://jituloying1.github.io/Pathaidedriverbookingpage/" onclick="goPage(event,this)">
  <button>Hire a Driver</button>
</a>

<a href="https://jituloying1.github.io/NortestTechnology/" onclick="goPage(event,this)">
  <button>Send a Package</button>
</a>

<a href="https://jituloying1.github.io/assamtech.come/" onclick="goPage(event,this)">
  <button>Book Tractor Service</button>
</a>

<!-- CENTER BUTTONS -->
<div class="center-btn">

  <!-- ABOUT -->
  <a href="https://jituloying1.github.io/ABOUTEPATHAIDE/">
    <button class="small-btn"></button>
  </a>
  <!-- CALL -->
  <a href="https://jituloying1.github.io/Anvil/" onclick="goPage(event,this)">
    <button class="main-call-btn">CALL OR CHAT NOW</button>
  </a>

  <!-- TERMS -->
  <a href="Pathaide_Master_29_Clauses.pdf" download>
    <button class="small-btn">Terms & Condition</button>
  </a>

</div>

</div>

<!-- ABOUT POPUP -->
<div class="popup" id="aboutPopup">
  <div class="popup-content">
    <h3>About Us</h3>
    <p>Welcome to Pathaide Service Platform.</p>
    <p>We provide Bike, Car, E-Rickshaw, Driver and Logistics services.</p>
    <p>Fast, Reliable & Local Service.</p>
    <button class="close-btn" onclick="closeAbout()">Close</button>
  </div>
</div>

<script>
function goPage(event, link){
    event.preventDefault();
    document.body.classList.add("fade-out");

    setTimeout(()=>{
        window.location = link.href;
    },500);
}

function openAbout(){
    document.getElementById("aboutPopup").style.display = "flex";
}

function closeAbout(){
    document.getElementById("aboutPopup").style.display = "none";
}
</script>

</body>
</html>
