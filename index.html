<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Search</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;

            /* PAGE LOAD ANIMATION */
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        h2 {
            margin-top: 15px;
            font-size: 28px;
        }

        /* LOGO */
        .logo img {
            width: 200px;
            margin-top: 15px;
            animation: zoomIn 1s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* GRID */
        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        /* BUTTON STYLE */
        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        /* HOVER ANIMATION */
        button:hover {
            background: white;
            color: #1e3c72;
            transform: translateY(-5px) scale(1.05);
        }

        /* CLICK ANIMATION */
        button:active {
            transform: scale(0.95);
        }

        /* CENTER LAST BUTTON */
        .center-btn {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
        }

        .center-btn button {
            width: 60%;
            background: #ff4b2b;
        }

        .center-btn button:hover {
            background: white;
            color: #ff4b2b;
        }

        /* PAGE TRANSITION EFFECT */
        .fade-out {
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }

        @media(max-width:500px){
            .center-btn button{
                width: 90%;
            }
        }

    </style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
    <img src="https://github.com/jituloying1/pathaidemainmenue/blob/main/file_000000004d2871fa8614eb9e6dbd62f0%20(1)-Photoroom.png">
</div>

<h2>Select Your Ride</h2>

<div class="btn-container">

<a href="https://jituloying1.github.io/pathaidebikecustomer/" onclick="goPage(event,this)">
  <button>Book Bike Ride</button>
</a>

<a href="https://jituloying1.github.io/pathaidecar/" onclick="goPage(event,this)">
  <button>Book Car Ride</button>
</a>

<a href="https://jituloying1.github.io/pathaideerikshw/" onclick="goPage(event,this)">
  <button>Book E-Rickshaw</button>
</a>

<a href="https://jituloying1.github.io/Pathaidedriverbookingpage/" onclick="goPage(event,this)">
  <button>Hire a Driver</button>
</a>

<a href="https://jituloying1.github.io/NortestTechnology/" onclick="goPage(event,this)">
  <button>Send a Package</button>
</a>

<a href="https://jituloying1.github.io/assamtech.come/" onclick="goPage(event,this)">
  <button>Book Tractor Service</button>
</a>

<!-- CENTER BUTTON -->
<div class="center-btn">
<a href="https://jituloying1.github.io/Anvil/" onclick="goPage(event,this)">
  <button>CALL OR CHAT NOW</button>
</a>
</div>

</div>

<script>
function goPage(event, link){
    event.preventDefault();

    document.body.classList.add("fade-out");

    setTimeout(()=>{
        window.location = link.href;
    },500);
}
</script>

</body>
</html>
