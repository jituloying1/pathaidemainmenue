<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Search</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .vehicle-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .vehicle {
            border: 2px solid transparent;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .vehicle img {
            width: 100px;
            height: 80px;
        }

        .vehicle:hover {
            transform: scale(1.1);
        }

        .selected {
            border: 2px solid green;
            background: #eaffea;
        }
    </style>
</head>

<body>

<h2>Select Your Ride</h2>

<div class="vehicle-container">

    <div class="vehicle" onclick="selectVehicle('bike', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
        <p>Bike</p>
    </div>

    <div class="vehicle" onclick="selectVehicle('car', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">
        <p>Car</p>
    </div>

    <div class="vehicle" onclick="selectVehicle('erickshaw', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/3082/3082383.png">
        <p>E-Rickshaw</p>
    </div>

    <div class="vehicle" onclick="selectVehicle('tractor', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
        <p>Tractor</p>
    </div>

    <div class="vehicle" onclick="selectVehicle('courier', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/1048/1048317.png">
        <p>Courier</p>
    </div>

    <!-- NEW DRIVER OPTION -->
    <div class="vehicle" onclick="selectVehicle('driver', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/1995/1995530.png">
        <p>Driver</p>
    </div>

</div>

<div id="results"></div>

<script>
function selectVehicle(vehicle, element) {

    // highlight selected
    document.querySelectorAll(".vehicle").forEach(v => v.classList.remove("selected"));
    element.classList.add("selected");

    let distance = 5;

    let rates = {
        bike: 10,
        car: 20,
        erickshaw: 15,
        tractor: 25,
        courier: 12,
        driver: 50   // NEW DRIVER RATE (per ride)
    };

    let price = rates[vehicle] * distance;

    // Special message for driver
    let typeText = vehicle === "driver" ? "Driver Booked" : vehicle.toUpperCase() + " Available";

    document.getElementById("results").innerHTML =
        `<p>${typeText}<br>
        Distance: ${distance} km<br>
        Price: ₹${price}</p>`;
}
</script>

</body>
</html>
