<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Search</title>

    <!-- IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;

            /* Professional Gradient */
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
        }

        h2 {
            margin-top: 20px;
            font-size: 28px;
        }

        /* RESPONSIVE CONTAINER */
        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        /* BUTTON DESIGN */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        button:hover {
            background: white;
            color: #1e3c72;
            transform: translateY(-3px);
        }

        /* RESULT BOX */
        #results {
            margin: 20px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 15px 20px;
            border-radius: 10px;
        }

        /* MOBILE FONT ADJUST */
        @media (max-width: 500px) {
            h2 {
                font-size: 22px;
            }

            button {
                font-size: 14px;
                padding: 12px;
            }
        }

    </style>
</head>

<body>

<h2>Select Your Ride</h2>

<div class="btn-container">

<a href="https://jituloying1.github.io/pathaidebikecustomer/">
  <button>Book Bike Ride</button>
</a>

<a href="https://jituloying1.github.io/pathaidecar/">
  <button>Book Car Ride</button>
</a>

<a href="https://jituloying1.github.io/pathaideerikshw/">
  <button>Book E-Rickshaw</button>
</a>

<a href="https://jituloying1.github.io/Pathaidedriverbookingpage/">
  <button>Hire a Driver</button>
</a>

<a href="https://jituloying1.github.io/NortestTechnology/">
  <button>Send a Package</button>
</a>

<a href="https://jituloying1.github.io/assamtech.come/">
  <button>Book Tractor Service</button>
</a>

<a href="https://jituloying1.github.io/Anvil/">
  <button>CALL OR CHAT NOW</button>
</a>

</div>

<div id="results"></div>

</body>
</html>
