<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Search</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .vehicle-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .vehicle {
            border: 2px solid transparent;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .vehicle img {
            width: 100px;
            height: 80px;
        }

        .vehicle:hover {
            transform: scale(1.1);
        }

        .selected {
            border: 2px solid green;
            background: #eaffea;
        }
    </style>
</head>

<body>

<h2>Search Ride</h2>

<input type="text" id="from" placeholder="From Location"><br><br>
<input type="text" id="to" placeholder="To Destination"><br><br>

<!-- Vehicle Images -->
<div class="vehicle-container">

    <div class="vehicle" onclick="selectVehicle('bike', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png">
        <p>Bike</p>
    </div>

    <div class="vehicle" onclick="selectVehicle('car', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">
        <p>Car</p>
    </div>

    <div class="vehicle" onclick="selectVehicle('erickshaw', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/3082/3082383.png">
        <p>E-Rickshaw</p>
    </div>

    <div class="vehicle" onclick="selectVehicle('tractor', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
        <p>Tractor</p>
    </div>

</div>

<button onclick="searchRide()">Search</button>

<div id="results"></div>

<script>
let selectedVehicle = "";

function selectVehicle(vehicle, element) {
    selectedVehicle = vehicle;

    // remove previous selection
    document.querySelectorAll(".vehicle").forEach(v => v.classList.remove("selected"));

    // highlight selected
    element.classList.add("selected");
}

function searchRide() {
    let distance = 5;

    let rates = {
        bike: 10,
        car: 20,
        erickshaw: 15,
        tractor: 25
    };

    if (!selectedVehicle) {
        alert("Please select a vehicle!");
        return;
    }

    let price = distance * rates[selectedVehicle];

    document.getElementById("results").innerHTML =
        `<p>${selectedVehicle.toUpperCase()} Available<br>
        Distance: ${distance} km<br>
        Price: ₹${price}</p>`;
}
</script>

</body>
</html>
