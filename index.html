<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Search</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;

            /* PROFESSIONAL GRADIENT BACKGROUND */
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: white;
        }

        h2 {
            margin-top: 30px;
            font-size: 32px;
            letter-spacing: 1px;
        }

        /* BUTTON CONTAINER */
        .btn-container {
            margin-top: 40px;
        }

        /* PROFESSIONAL BUTTON DESIGN */
        button {
            width: 220px;
            padding: 15px;
            margin: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        button:hover {
            background: white;
            color: #1e3c72;
            transform: translateY(-3px);
        }

        /* RESULT BOX */
        #results {
            margin-top: 30px;
            font-size: 18px;
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 15px 25px;
            border-radius: 10px;
        }

    </style>
</head>

<body>

<h2>Select Your Ride</h2>

<div class="btn-container">

<a href="https://jituloying1.github.io/pathaidebikecustomer/">
  <button>Book Bike Ride</button>
</a>

<a href="https://jituloying1.github.io/pathaidecar/">
  <button>Book Car Ride </button>
</a>

<br>

<a href="https://jituloying1.github.io/pathaideerikshw/">
  <button>Book E-Rickshaw</button>
</a>

<a href="https://jituloying1.github.io/Pathaidedriverbookingpage/">
  <button>Hire a Driver</button>
</a>

<br>

<a href="https://jituloying1.github.io/NortestTechnology/">
  <button> Send a Package </button>
</a>

<a href="https://jituloying1.github.io/assamtech.come/">
  <button>Book Tractor Service </button>
</a>

<br>

<a href="https://jituloying1.github.io/Anvil/">
  <button> CALL OR CHAT NOW </button>
</a>

</div>

<div id="results"></div>

</body>
</html>
